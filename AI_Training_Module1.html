<script>
const course = [
  {
    type: "content",
    title: "AI Is Already Part of Your Work",
    text: "AI tools are increasingly used to draft, summarise, and improve content. This short course helps you use them safely and effectively.",
    image: "Images/hero_ai_at_work.png"
  },
  {
    type: "scenario",
    title: "Scenario",
    text: "You’re preparing a presentation under time pressure. You ask an AI tool to explain your business strategy.",
    image: "Images/scenario_presentation_deadline.png"
  },
  {
    type: "content",
    title: "Key Insight",
    text: "AI does not understand your business or goals. It predicts what sounds correct based on patterns — not comprehension.",
    image: "Images/mental_model_human_vs_ai.png"
  },
  {
    type: "question",
    title: "Decision Time",
    question: "What should you do next?",
    image: "Images/decision_review_vs_publish.png",
    options: [
      { label: "Use it as-is – it sounds professional", correct: false },
      { label: "Review, validate, and adjust the content", correct: true },
      { label: "Ask AI to make it even more confident", correct: false }
    ]
  },
  {
    type: "content",
    title: "Key Takeaway",
    text: "If AI wrote it, you own it. AI assists with drafting, but accountability always stays with you.",
    image: "Images/ownership_responsibility.png"
  }
];

let step = 0;
let score = 0;
let answered = false;

function render() {
  const c = document.getElementById("content");
  const s = course[step];
  answered = false;
  window.scrollTo(0, 0);

  if (!s) {
    showCompletion();
    return;
  }

  let html = "<h2>" + s.title + "</h2>";

  if (s.image) {
    html += '<div class="visual"><img src="' + s.image + '" alt=""></div>';
  }

  if (s.type === "question") {
    html += "<p><strong>" + s.question + "</strong></p>";
    for (let i = 0; i < s.options.length; i++) {
      html += '<button onclick="answer(' + i + ')">' + s.options[i].label + "</button>";
    }
  } else {
    html += "<p>" + s.text + "</p>";
    html += '<button onclick="next()">Continue</button>';
  }

  if (s.type === "scenario") {
    html += '<div class="scenario">Scenario: ' + s.text + "</div>";
    html += '<button onclick="next()">Continue</button>';
  }

  c.innerHTML = html;
}

function answer(index) {
  if (answered) return;
  answered = true;

  const s = course[step];
  const c = document.getElementById("content");

  if (s.options[index].correct) {
    score++;
    c.innerHTML += '<div class="correct">✅ Correct. AI output must always be reviewed.</div>';
  } else {
    c.innerHTML += '<div class="warning">⚠ This can introduce errors or misinformation.</div>';
  }

  c.innerHTML += '<button onclick="next()">Continue</button>';
}

function next() {
  step++;
  render();
}

function showCompletion() {
  const c = document.getElementById("content");
  const total = course.filter(x => x.type === "question").length;

  if (score === total) {
    c.innerHTML =
      "<h2>Module completed</h2>" +
      "<p>You answered " + score + " out of " + total + " questions correctly.</p>" +
      "<p>✅ You have successfully completed this training module.</p>";
  } else {
    c.innerHTML =
      "<h2>Review required</h2>" +
      "<p>You answered " + score + " out of " + total + " questions correctly.</p>" +
      "<p>❌ All questions must be answered correctly to complete the module.</p>" +
      '<button onclick="restart()">Retry module</button>';
  }
}

function restart() {
  step = 0;
  score = 0;
  render();
}

render();
</script>
