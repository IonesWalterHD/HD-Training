<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI at Work – Foundations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f5f5;
      color: #323130;
    }

    header {
      background: #005a9e;
      color: white;
      padding: 24px 36px;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .visual img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 20px 0;
    }

    .scenario {
      background: #f3f9ff;
      border-left: 4px solid #005a9e;
      padding: 16px;
      margin: 24px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f9f9f9;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #eaeaea;
    }

    .correct {
      color: #107c10;
      font-weight: 600;
      margin-top: 16px;
    }

    .warning {
      color: #a4262c;
      font-weight: 600;
      margin-top: 16px;
    }
  </style>
</head>

<body>

<header>
  <h1>AI at Work</h1>
  <p>Using AI Effectively and Responsibly</p>
</header>

<main>
  <div class="card" id="content"></div>
</main>

<script>

      title: "AI Is Already Part of Your Work",
      text:
        "AI tools are increasingly used to draft, summarise, and improve content. " +

    {
      title: "Key Insight",

        "AI does not understand your business or goals. " +

    },

      title: "Decision Time",

        { label: "Ask AI to make it even more confident", correct: false }
      ]
    },
    {
      title: "Key Takeaway",
      text:
        "If AI wrote it, you own it. " +
        "AI assists with drafting, but accountability always stays with you.",
      image: "Images/ownership_responsibility.png"
    }
  ];

  function render() {
    const container = document.getElementById("content");
    const screen = course[step];

    if (!screen) {
      container.innerHTML =
        "<h2>Module completed</h2>" +
        "<p>You have completed this training module.</p>";
      return;
    }

    let html = "<h2>" + screen.title + "</h2>";

    if (screen.image) {
      html +=
        '<div class="visual">' +
        '<img src="' + screen.image + '" alt="">' +
        "</div>";
    }

    if (screen.text) {
      html += "<p>" + screen.text + "</p>";
    }

        '<div class="scenario">' +
        "<strong>Scenario:</strong> " + screen.text +
        "</div>";
    }
